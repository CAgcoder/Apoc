services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=apoc-research
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped

  # Langfuse — tracing + eval hosting (http://localhost:${LANGFUSE_WEB_PORT:-3000})
  # Keys are pre-provisioned by LANGFUSE_INIT_* vars in .env — no manual signup needed.
  # The APoc backend reads them automatically via LANGFUSE_INIT_PROJECT_PUBLIC/SECRET_KEY.
  langfuse:
    image: langfuse/langfuse:3
    ports:
      - "${LANGFUSE_WEB_PORT:-3000}:3000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://langfuse:${LANGFUSE_POSTGRES_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-change-me}
      - SALT=${LANGFUSE_SALT:-change-me}
      - LANGFUSE_TELEMETRY_ENABLED=false
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=${LANGFUSE_POSTGRES_PASSWORD:-langfuse}
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  langfuse_db:
